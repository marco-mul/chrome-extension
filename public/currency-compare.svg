<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 215" width="420" height="215">
  <defs>
    <radialGradient id="eur-grad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1D4FD8"/>
      <stop offset="100%" stop-color="#0B2C7A"/>
    </radialGradient>
    <filter id="vs-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#242424" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Euro: base currency -->
  <g transform="translate(100,110)">
    <circle r="75" fill="url(#eur-grad)"/>
    <text x="0" y="26" text-anchor="middle" font-size="76" font-weight="700"
          font-family="Georgia, 'Times New Roman', serif" fill="#FFFFFF">&#8364;</text>
  </g>
  <!-- VS divider -->
  <text x="237" y="130" text-anchor="middle" font-size="48" font-weight="800"
        font-family="Arial, sans-serif" fill="#FFFFFF" letter-spacing="1"
        filter="url(#vs-shadow)">VS</text>

  <!-- USD -->
  <g transform="translate(330,45)">
    <circle r="32" fill="#15803D"/>
    <text x="0" y="12" text-anchor="middle" font-size="32" font-weight="700"
          font-family="Georgia, 'Times New Roman', serif" fill="#FFFFFF">$</text>
  </g>
  <text x="330" y="90" text-anchor="middle" font-size="13" font-weight="600"
        font-family="Arial, sans-serif" fill="#334155">USD</text>

  <!-- GBP -->
  <g transform="translate(330,110)">
    <circle r="32" fill="#7C2D92"/>
    <text x="0" y="12" text-anchor="middle" font-size="32" font-weight="700"
          font-family="Georgia, 'Times New Roman', serif" fill="#FFFFFF">&#163;</text>
  </g>
  <text x="330" y="155" text-anchor="middle" font-size="13" font-weight="600"
        font-family="Arial, sans-serif" fill="#334155">GBP</text>

  <!-- CHF: Swiss cross, since the franc has no single glyph -->
  <g transform="translate(330,175)">
    <circle r="32" fill="#DC2626"/>
    <rect x="-4" y="-16" width="8" height="32" fill="#FFFFFF"/>
    <rect x="-16" y="-4" width="32" height="8" fill="#FFFFFF"/>
  </g>
</svg>
