<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Personal Dashboard</title>
  </head>
  <body>
    <main>
      <div class="top">
        <div id="crypto">
          <div id="crypto-top"></div>
        </div>
        <div id="weather"></div>
      </div>
      <div id="time-container">
        <h1 id="time" class="time"></h1>
        <div id="links">
          <div class="link">
            <img src="gazzetta-logo.jpeg" alt="Gazzetta" />
            <a href="https://www.gazzetta.it" target="_blank">La Gazzetta</a>
          </div>
          <div class="link">
            <img src="lequipe-logo.png" alt="L'Equipe" />
            <a href="https://www.lequipe.fr" target="_blank">L'Equipe</a>
          </div>
          <div class="link">
            <img src="gmail-logo.jpg" alt="Gmail" />
            <a href="https://mail.google.com" target="_blank">Gmail</a>
          </div>
          <div class="link">
            <img src="sofascore-logo.png" alt="SofaScore" />
            <a href="https://www.sofascore.com" target="_blank">SofaScore</a>
          </div>
        </div>
        <div id="quote">
          <span class="quote-title">Looking for a joke...</span>
        </div>
      </div>
      <p id="author"></p>
    </main>
    <script src="index.js"></script>
  </body>
</html>
